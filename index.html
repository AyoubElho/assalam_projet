<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>إدارة بيانات الأسر</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <meta name="theme-color" content="#3552d9" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="إدارة بيانات الأسر" />
    <meta property="og:image" content="logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="logo.png" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("familyRecordsTheme") || "light";
          document.documentElement.dataset.theme =
            theme === "dark" ? "dark" : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link href="style.css?v=65" rel="stylesheet" />
  </head>
  <body class="antialiased">
    <header class="app-header">
      <div class="container py-2">
        <div class="header-row">
          <div class="header-brand">
            <img class="header-logo header-logo-light" src="logo.png" alt="" />
            <img
              class="header-logo header-logo-dark"
              src="logo%20white.png"
              alt=""
            />
          </div>
          <div class="header-copy">
            <p class="text-uppercase small fw-bold mb-2 app-kicker">
              سجل الأسر
            </p>
          </div>
          <div class="header-actions">
            <button
              class="btn btn-outline-secondary theme-toggle"
              id="themeToggleBtn"
              type="button"
              title="تبديل الوضع الليلي"
              aria-label="تبديل الوضع الليلي"
              aria-pressed="false"
            >
              <i class="bi bi-moon-stars"></i>
              <span class="theme-label">ليلي</span>
            </button>
            <button
              class="btn btn-outline-danger"
              id="logoutBtn"
              aria-label="تسجيل الخروج"
              type="button"
              title="تسجيل الخروج"
            >
              <i class="bi bi-box-arrow-right"></i>
              خروج
            </button>
            <button
              class="btn btn-outline-secondary profile-button"
              id="profileBtn"
              type="button"
              data-bs-toggle="modal"
              data-bs-target="#profileModal"
              title="إدارة الملف الشخصي"
            >
              <span class="profile-avatar" id="headerProfileAvatar">?</span>
              <span id="headerProfileName">الملف</span>
            </button>
            <button
              class="btn btn-outline-secondary"
              id="accountsBtn"
              aria-label="إدارة الحسابات"
              type="button"
              data-bs-toggle="modal"
              data-bs-target="#accountsModal"
              title="إدارة الحسابات"
              hidden
            >
              <i class="bi bi-people"></i>
              حسابات
            </button>
            <button
              class="btn btn-outline-secondary"
              id="exportCsvBtn"
              type="button"
              title="تصدير Excel"
              aria-label="تصدير Excel"
            >
              <i class="bi bi-file-earmark-spreadsheet"></i>
              Excel
            </button>
            <button
              class="btn btn-primary"
              id="generatePdfBtn"
              aria-label="تصدير PDF"
              type="button"
              title="تصدير جميع السجلات في PDF واحد"
            >
              <i class="bi bi-file-earmark-pdf"></i>
              PDF
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="container app-shell py-4">
      <div class="row g-4">
        <section class="col-lg-7">
          <form id="familyForm" class="workspace-panel" autocomplete="off">
            <input type="hidden" id="recordId" />

            <div
              class="d-flex align-items-center justify-content-between gap-3 mb-3"
            >
              <div>
                <h2 class="h5 mb-1">بيانات الأسرة</h2>
                <p class="text-secondary mb-0">املأ المعلومات ثم احفظها.</p>
              </div>
              <span class="badge text-bg-light border" id="formModeBadge"
                >إضافة جديدة</span
              >
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="motherName">اسم الأم</label>
                <input
                  class="form-control"
                  id="motherName"
                  name="motherName"
                  type="text"
                  placeholder="مثال: فاطمة الزهراء"
                  required
                />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="motherCin"
                  >رقم البطاقة الوطنية</label
                >
                <input
                  class="form-control"
                  id="motherCin"
                  name="motherCin"
                  type="text"
                  placeholder="مثال: AB123456"
                />
              </div>
              <div class="col-md-5">
                <label class="form-label" for="motherPhone">الهاتف</label>
                <input
                  class="form-control"
                  id="motherPhone"
                  name="motherPhone"
                  type="tel"
                  placeholder="مثال: 0612345678"
                />
              </div>
              <div class="col-md-7">
                <label class="form-label" for="motherAddress">العنوان</label>
                <input
                  class="form-control"
                  id="motherAddress"
                  name="motherAddress"
                  type="text"
                  placeholder="العنوان"
                />
              </div>
            </div>

            <div class="children-toolbar mt-4">
              <div>
                <h3 class="h6 mb-1">الأبناء</h3>
                <p class="text-secondary mb-0">
                  يمكنك إضافة عدد غير محدود من الأبناء.
                </p>
              </div>
              <button
                class="btn btn-outline-primary btn-sm"
                id="addChildBtn"
                type="button"
                title="إضافة ابن"
              >
                <i class="bi bi-plus-lg"></i>
                إضافة ابن
              </button>
            </div>

            <div class="children-table mt-3">
              <div class="table-responsive">
                <table class="table align-middle mb-0">
                  <thead>
                    <tr>
                      <th scope="col">اسم الابن</th>
                      <th scope="col">تاريخ الازدياد</th>
                      <th scope="col">المستوى الدراسي</th>
                      <th scope="col">المدرسة</th>
                      <th scope="col" class="action-col">حذف</th>
                    </tr>
                  </thead>
                  <tbody id="childrenBody"></tbody>
                </table>
              </div>
            </div>

            <div class="form-actions mt-4">
              <button class="btn btn-success" id="saveNewBtn" type="button">
                <i class="bi bi-arrow-return-left"></i>
                حفظ والسطر التالي
              </button>
              <button
                class="btn btn-outline-secondary"
                id="newFormBtn"
                type="button"
              >
                <i class="bi bi-plus-square"></i>
                جديد
              </button>
            </div>
          </form>
        </section>

        <aside class="col-lg-5">
          <section class="workspace-panel records-panel">
            <div
              class="d-flex align-items-center justify-content-between gap-3 mb-3"
            >
              <div>
                <h2 class="h5 mb-1">البيانات المحفوظة</h2>
                <p class="text-secondary mb-0">
                  <span id="recordCount">0</span> أسرة في قاعدة البيانات.
                </p>
              </div>
            </div>

            <div class="input-group mb-3">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input
                class="form-control"
                id="searchInput"
                type="search"
                placeholder="ابحث باسم الأم، رقم البطاقة الوطنية أو أحد الأبناء"
              />
            </div>

            <div class="d-flex gap-2 mb-3 align-items-center">
              <select
                id="filterLevel"
                class="form-select form-select-sm"
                aria-label="فلتر المستوى"
              >
                <option value="">كل المستويات</option>
                <option value="التعليم الأولي">التعليم الأولي</option>
                <option value="الأول ابتدائي">الأول ابتدائي</option>
                <option value="الثاني ابتدائي">الثاني ابتدائي</option>
                <option value="الثالث ابتدائي">الثالث ابتدائي</option>
                <option value="الرابع ابتدائي">الرابع ابتدائي</option>
                <option value="الخامس ابتدائي">الخامس ابتدائي</option>
                <option value="السادس ابتدائي">السادس ابتدائي</option>
                <option value="الأولى إعدادي">الأولى إعدادي</option>
                <option value="الثانية إعدادي">الثانية إعدادي</option>
                <option value="الثالثة إعدادي">الثالثة إعدادي</option>
                <option value="الجذع المشترك">الجذع المشترك</option>
                <option value="الأولى باكالوريا">الأولى باكالوريا</option>
                <option value="الثانية باكالوريا">الثانية باكالوريا</option>
                <option value="جامعي">جامعي</option>
                <option value="غير متمدرس">غير متمدرس</option>
              </select>

              <select
                id="filterSchool"
                class="form-select form-select-sm"
                aria-label="فلتر المدرسة"
              >
                <option value="">كل المدارس</option>
              </select>

              <select
                id="filterSupport"
                class="form-select form-select-sm"
                aria-label="فلتر الدعم"
              >
                <option value="">الكل</option>
                <option value="supported">مدعومة</option>
                <option value="unsupported">غير مدعومة</option>
              </select>

              <button
                id="clearFiltersBtn"
                class="btn btn-outline-secondary btn-sm"
                type="button"
                title="مسح الفلاتر"
              >
                مسح
              </button>
            </div>

            <div id="recordsList" class="records-list" aria-live="polite"></div>
            <div class="records-pagination" id="recordsPagination">
              <button
                class="btn btn-outline-secondary btn-sm"
                id="prevPageBtn"
                type="button"
              >
                <i class="bi bi-chevron-right"></i>
                السابق
              </button>
              <span id="pageInfo" class="page-info">1 / 1</span>
              <button
                class="btn btn-outline-secondary btn-sm"
                id="nextPageBtn"
                type="button"
              >
                التالي
                <i class="bi bi-chevron-left"></i>
              </button>
              <select
                class="form-select form-select-sm page-size-select"
                id="pageSizeSelect"
                aria-label="عدد السجلات في الصفحة"
              >
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
              </select>
            </div>
          </section>
        </aside>
      </div>
    </main>

    <template id="childRowTemplate">
      <tr class="child-row">
        <td>
          <input
            class="form-control child-name"
            type="text"
            placeholder="اسم الابن"
          />
        </td>
        <td>
          <input
            class="form-control child-birth"
            type="text"
            placeholder="YYYY-MM-DD"
          />
        </td>
        <td>
          <select class="form-select child-level">
            <option value="">اختر المستوى</option>
            <option value="التعليم الأولي">التعليم الأولي</option>
            <option value="الأول ابتدائي">الأول ابتدائي</option>
            <option value="الثاني ابتدائي">الثاني ابتدائي</option>
            <option value="الثالث ابتدائي">الثالث ابتدائي</option>
            <option value="الرابع ابتدائي">الرابع ابتدائي</option>
            <option value="الخامس ابتدائي">الخامس ابتدائي</option>
            <option value="السادس ابتدائي">السادس ابتدائي</option>
            <option value="الأولى إعدادي">الأولى إعدادي</option>
            <option value="الثانية إعدادي">الثانية إعدادي</option>
            <option value="الثالثة إعدادي">الثالثة إعدادي</option>
            <option value="الجذع المشترك">الجذع المشترك</option>
            <option value="الأولى باكالوريا">الأولى باكالوريا</option>
            <option value="الثانية باكالوريا">الثانية باكالوريا</option>
            <option value="جامعي">جامعي</option>
            <option value="غير متمدرس">غير متمدرس</option>
          </select>
        </td>
        <td>
          <input
            class="form-control child-school"
            type="text"
            list="schoolOptions"
            placeholder="اسم المدرسة"
          />
        </td>
        <td class="text-center action-col">
          <button
            class="btn btn-outline-danger btn-sm remove-child"
            type="button"
            title="حذف السطر"
          >
            <i class="bi bi-x-lg"></i>
          </button>
        </td>
      </tr>
    </template>

    <datalist id="schoolOptions"></datalist>

    <div
      class="modal fade"
      id="profileModal"
      tabindex="-1"
      aria-labelledby="profileModalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content profile-modal-content">
          <div class="modal-header">
            <h2 class="modal-title h5" id="profileModalTitle">
              إدارة الملف الشخصي
            </h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <form id="profileForm">
            <div class="modal-body">
              <div class="profile-editor">
                <div class="profile-preview" id="profileImagePreview">?</div>
                <div class="profile-editor-fields">
                  <p class="record-meta mb-2" id="profileMeta"></p>
                  <label class="form-label" for="profileDisplayName"
                    >الاسم المعروض</label
                  >
                  <input
                    class="form-control"
                    id="profileDisplayName"
                    name="displayName"
                    type="text"
                    maxlength="80"
                  />
                  <label class="form-label mt-3" for="profileImageInput"
                    >صورة الملف</label
                  >
                  <input
                    class="form-control"
                    id="profileImageInput"
                    name="profileImage"
                    type="file"
                    accept="image/png,image/jpeg,image/webp,image/gif"
                  />
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-outline-secondary"
                data-bs-dismiss="modal"
              >
                إلغاء
              </button>
              <button class="btn btn-primary" id="profileSaveBtn" type="submit">
                <i class="bi bi-person-check"></i>
                حفظ الملف
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="accountsModal"
      tabindex="-1"
      aria-labelledby="accountsModalTitle"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content account-modal-content">
          <div class="modal-header">
            <h2 class="modal-title h5" id="accountsModalTitle">
              إدارة الحسابات
            </h2>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form
              id="accountForm"
              class="account-create-form"
              autocomplete="off"
            >
              <div class="row g-3 align-items-end">
                <div class="col-md-4">
                  <label class="form-label" for="accountUsername"
                    >اسم المستخدم</label
                  >
                  <input
                    class="form-control"
                    id="accountUsername"
                    type="text"
                    pattern="[A-Za-z0-9_.-]{3,40}"
                    placeholder="writer2"
                    required
                  />
                </div>
                <div class="col-md-3">
                  <label class="form-label" for="accountRole">الدور</label>
                  <select class="form-select" id="accountRole">
                    <option value="writer" selected>كاتب</option>
                    <option value="admin">مدير</option>
                  </select>
                </div>
                <div class="col-md-5">
                  <label class="form-label" for="accountPassword"
                    >كلمة المرور</label
                  >
                  <div class="input-group">
                    <input
                      class="form-control"
                      id="accountPassword"
                      type="text"
                      minlength="6"
                      placeholder="اتركها فارغة للتوليد"
                    />
                    <button
                      class="btn btn-outline-secondary"
                      id="accountGenerateBtn"
                      type="button"
                    >
                      <i class="bi bi-magic"></i>
                      توليد
                    </button>
                  </div>
                </div>
              </div>
              <div class="account-form-actions">
                <button
                  class="btn btn-primary"
                  id="accountCreateBtn"
                  type="submit"
                >
                  <i class="bi bi-person-plus"></i>
                  إضافة حساب
                </button>
              </div>
            </form>

            <div
              class="generated-password-box"
              id="generatedPasswordBox"
              hidden
            >
              <div>
                <span>كلمة المرور الجديدة</span>
                <code id="generatedPasswordValue"></code>
              </div>
              <button
                class="btn btn-outline-secondary btn-sm"
                id="copyGeneratedPasswordBtn"
                type="button"
              >
                <i class="bi bi-clipboard"></i>
                نسخ
              </button>
            </div>

            <div
              class="accounts-list"
              id="accountsList"
              aria-live="polite"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 start-0 p-3">
      <div
        id="appToast"
        class="toast align-items-center border-0"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      >
        <div class="d-flex">
          <div class="toast-body" id="toastMessage"></div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ar.js"></script>
    <script src="script.js?v=68"></script>
  </body>
</html>
