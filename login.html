<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تسجيل الدخول</title>
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" href="logo.png" />
    <meta name="theme-color" content="#3552d9" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="تسجيل الدخول" />
    <meta property="og:image" content="logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="logo.png" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("familyRecordsTheme") || "light";
          document.documentElement.dataset.theme = theme === "dark" ? "dark" : "light";
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link href="style.css?v=62" rel="stylesheet" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <div class="login-logo-wrap">
          <img class="login-logo login-logo-light" src="logo.png" alt="" />
          <img class="login-logo login-logo-dark" src="logo%20white.png" alt="" />
        </div>

        <div class="login-heading">
          <p class="app-kicker mb-2">سجل الأسر</p>
          <h1>تسجيل الدخول</h1>
        </div>

        <form id="loginForm" class="login-form" autocomplete="off">
          <div>
            <label class="form-label" for="username">اسم المستخدم</label>
            <input
              class="form-control"
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              required
            />
          </div>

          <div>
            <label class="form-label" for="password">كلمة المرور</label>
            <input
              class="form-control"
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>

          <p class="login-error" id="loginError" hidden></p>

          <button class="btn btn-primary login-submit" id="loginSubmit" type="submit">
            <i class="bi bi-shield-lock"></i>
            دخول
          </button>
        </form>
      </section>
    </main>

    <script>
      const API_BASE_STORAGE_KEY = "familyRecordsApiBase";
      const API_FALLBACK_BASES = ["", "http://localhost:8000", "http://127.0.0.1:8000"];
      const LOGIN_ENDPOINTS = endpointCandidates("api/login.php");
      const SESSION_ENDPOINTS = endpointCandidates("api/session.php");
      const form = document.getElementById("loginForm");
      const username = document.getElementById("username");
      const password = document.getElementById("password");
      const submit = document.getElementById("loginSubmit");
      const errorBox = document.getElementById("loginError");

      function getStoredApiBase() {
        try {
          return localStorage.getItem(API_BASE_STORAGE_KEY) || "";
        } catch (error) {
          return "";
        }
      }

      function setStoredApiBase(base) {
        try {
          localStorage.setItem(API_BASE_STORAGE_KEY, base || "");
        } catch (error) {
          // Local storage can be unavailable in private or restricted browser modes.
        }
      }

      function endpointCandidates(path) {
        if (window.location.protocol === "http:" || window.location.protocol === "https:") {
          return [path];
        }

        const storedBase = getStoredApiBase();
        const bases = [storedBase, ...API_FALLBACK_BASES.filter(Boolean)].filter(
          (base, index, allBases) => allBases.indexOf(base) === index,
        );

        return bases.map((base) => `${base.replace(/\/$/, "")}/${path}`);
      }

      function apiBaseFromEndpoint(endpoint) {
        if (!/^https?:\/\//i.test(endpoint)) {
          return "";
        }

        try {
          const url = new URL(endpoint);
          url.pathname = url.pathname.replace(/\/api\/[^/]*$/, "");
          url.search = "";
          url.hash = "";
          return url.href.replace(/\/$/, "");
        } catch (error) {
          return "";
        }
      }

      async function fetchFirst(endpoints, options = {}) {
        let lastError = null;
        for (const endpoint of endpoints) {
          try {
            const response = await fetch(endpoint, {
              credentials: "include",
              ...options,
              headers: {
                "Content-Type": "application/json",
                ...(options.headers || {}),
              },
            });
            const contentType = response.headers.get("content-type") || "";
            const result = contentType.includes("application/json")
              ? await response.json()
              : null;

            if (!response.ok || !result?.success) {
              throw new Error(result?.message || `HTTP ${response.status}`);
            }

            result.endpoint = endpoint;
            setStoredApiBase(apiBaseFromEndpoint(endpoint));
            return result;
          } catch (error) {
            lastError = error;
          }
        }

        throw lastError || new Error("Request failed.");
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.hidden = false;
      }

      async function redirectIfLoggedIn() {
        for (const endpoint of SESSION_ENDPOINTS) {
          try {
            const session = await fetchFirst([endpoint]);
            if (session.authenticated) {
              window.location.replace(getIndexUrl(session.endpoint));
              return;
            }
          } catch (error) {
            // Try the next endpoint before staying on the login page.
          }
        }
      }

      function getIndexUrl(endpoint) {
        if (/^https?:\/\//i.test(endpoint)) {
          return new URL("../index.html", endpoint).href;
        }
        return "index.html";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.hidden = true;
        submit.disabled = true;

        try {
          const login = await fetchFirst(LOGIN_ENDPOINTS, {
            method: "POST",
            body: JSON.stringify({
              username: username.value.trim(),
              password: password.value,
            }),
          });
          window.location.replace(getIndexUrl(login.endpoint));
        } catch (error) {
          showError("اسم المستخدم أو كلمة المرور غير صحيحة.");
        } finally {
          submit.disabled = false;
        }
      });

      redirectIfLoggedIn();
    </script>
  </body>
</html>
